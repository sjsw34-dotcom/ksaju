<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 40" fill="none">
  <defs>
    <linearGradient id="emblemGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="20" cy="20" r="18" stroke="url(#ringGrad)" stroke-width="1.2"/>

  <!-- Inner thin ring -->
  <circle cx="20" cy="20" r="13" stroke="url(#ringGrad)" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- 4-pointed star (사주 四柱) -->
  <path d="M20 9 L21.9 16.8 L28 18 L21.9 19.2 L20 27 L18.1 19.2 L12 18 L18.1 16.8 Z" fill="url(#emblemGrad)"/>

  <!-- Center dot -->
  <circle cx="20" cy="18" r="1.8" fill="#FAF9F6" opacity="0.95"/>

  <!-- UNMYUNG -->
  <text
    x="46" y="17"
    font-family="Pretendard, Inter, -apple-system, sans-serif"
    font-size="15"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="0.8"
  >UNMYUNG</text>

  <!-- THERAPY -->
  <text
    x="47.5" y="32"
    font-family="Pretendard, Inter, -apple-system, sans-serif"
    font-size="9"
    font-weight="500"
    fill="#F59E0B"
    letter-spacing="4.5"
  >THERAPY</text>
</svg>
